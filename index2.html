<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Webpage</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* Header */
        header {
            background-color: #4CAF50;
            color: white;
            padding: 15px;
            text-align: center;
        }

        /* Navigation */
        nav {
            background-color: #333;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            color: yellow;
        }

        /* Main Layout */
        .container {
            display: flex;
        }

        /* Sidebar */
        .sidebar {
            width: 25%;
            background-color: #f4f4f4;
            padding: 15px;
        }

        /* Content */
        .content {
            width: 75%;
            padding: 15px;
        }

        /* Footer */
        footer {
            background-color: #222;
            color: white;
            text-align: center;
            padding: 10px;
        }
    </style>
</head>

<body>

    <header>
        <h1>My Website</h1>
        <p>Welcome to my simple webpage</p>
    </header>

    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
    </nav>

    <div class="container">
        <div class="sidebar">
            <h3>Sidebar</h3>
            <p>Links or content here</p>
        </div>

        <div class="content">
            <h2>Main Content</h2>
            <p>This is the main content area of the webpage.</p>
        </div>
    </div>

    <footer>
        <p>© 2026 My Website</p>
    </footer>

</body>
</html>
