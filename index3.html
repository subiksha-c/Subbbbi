<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Layout Page</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
        }

        /* Header */
        header {
            background-color: #222;
            color: white;
            padding: 15px;
            text-align: center;
        }

        /* Navbar */
        nav {
            background-color: #555;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
        }

        nav a:hover {
            color: orange;
        }

        /* Cards Section */
        .cards {
            display: flex;
            justify-content: space-around;
            padding: 20px;
            flex-wrap: wrap;
        }

        .card {
            background-color: white;
            width: 250px;
            margin: 10px;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            text-align: center;
        }

        .card img {
            width: 100%;
            border-radius: 10px;
        }

        /* Footer */
        footer {
            background-color: #222;
            color: white;
            text-align: center;
            padding: 10px;
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <header>
        <h1>My Modern Website</h1>
        <p>Clean Card Layout Design</p>
    </header>

    <nav>
        <a href="#">Home</a>
        <a href="#">Portfolio</a>
        <a href="#">Blog</a>
        <a href="#">Contact</a>
    </nav>

    <section class="cards">
        <div class="card">
            <img src="https://via.placeholder.com/250" alt="Image">
            <h3>Card Title 1</h3>
            <p>This is a simple card description.</p>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/250" alt="Image">
            <h3>Card Title 2</h3>
            <p>This is a simple card description.</p>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/250" alt="Image">
            <h3>Card Title 3</h3>
            <p>This is a simple card description.</p>
        </div>
    </section>

    <footer>
        <p>© 2026 My Modern Website</p>
    </footer>

</body>
</html>
